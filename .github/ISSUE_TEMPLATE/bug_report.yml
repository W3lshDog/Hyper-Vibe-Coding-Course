name: Bug report
description: Report something broken or incorrect
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please include enough detail for reproduction.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened and what you expected to happen
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: files
    attributes:
      label: Files / Links
      description: Link to relevant file(s) or sections
      placeholder: |
        - 02_LANDING_PAGE.html
        - docs/...
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots (optional)
      description: Drag and drop screenshots here
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Low
        - Medium
        - High
    validations:
      required: true

